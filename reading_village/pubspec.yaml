name: reading_village
description: Read-to-Play Village - A mobile game that turns reading into a village builder.

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.21.0
  provider: ^6.1.2
  sqflite: ^2.3.3+2
  path: ^1.9.0
  cupertino_icons: ^1.0.8
  confetti: ^0.7.0
  intl: ^0.19.0
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  http: ^1.2.2
  get_it: ^7.6.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/data/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/reading_village_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/reading_village_icon.png"
